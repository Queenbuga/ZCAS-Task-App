 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZCAS Group Task Manager</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 400px;
        }
        h2 { color: #4a4e69; text-align: center; }
        .input-group { margin-bottom: 15px; display: flex; gap: 10px; }
        input { 
            flex: 1;
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
        }
        #searchInput { background-color: #f0fdfa; border: 1px solid #74ebd5; }
        button { 
            padding: 10px 15px; 
            background-color: #6c63ff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
        }
        button:hover { background-color: #5753d9; }
        ul { list-style: none; padding: 0; }
        li { 
            background: #f8f9fa; 
            margin: 8px 0; 
            padding: 12px; 
            border-left: 5px solid #6c63ff; 
            border-radius: 4px; 
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>ZCAS Smart Tasks</h2>
        
        <div class="input-group">
            <input type="text" id="searchInput" onkeyup="searchTasks()" placeholder="Search tasks...">
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
